<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3-Way Compare — Interest OS</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0D0D0D;color:#E5E5E5;font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
    .ch{text-align:center;padding:20px 16px 16px;border-bottom:1px solid #2A2A2A}
    .ch h1{font-size:1.25rem;font-weight:700;font-family:"Space Mono",monospace}
    .ch h1 span{color:#00E5FF}
    .ch p{color:#888;font-size:0.75rem;margin-top:4px}
    .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px;height:calc(100vh - 110px)}
    .panel{display:flex;flex-direction:column;border:1px solid #2A2A2A;overflow:hidden}
    .panel.raw{border-color:rgba(0,229,255,0.25)}
    .pl{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#141414;border-bottom:1px solid #2A2A2A;font-size:0.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;font-family:"Space Mono",monospace}
    .badge{font-size:0.625rem;padding:2px 8px;border-radius:2px;font-family:"Space Mono",monospace}
    .badge-std{background:rgba(255,255,255,0.08);color:#A1A1AA}
    .badge-pro{background:linear-gradient(135deg,#6366F1,#EC4899);color:#FFF}
    .badge-raw{background:#00E5FF;color:#0D0D0D}
    .panel iframe{flex:1;border:none;width:100%}
    .leg{display:flex;justify-content:center;gap:24px;padding:12px;font-size:0.6875rem;color:#555;font-family:"Space Mono",monospace}
    .leg span{display:flex;align-items:center;gap:6px}
    .leg .dot{width:6px;height:6px;border-radius:2px}
  </style>
</head>
<body>
  <div class="ch">
    <h1>Interest_<span>OS</span> &mdash; 3-Way Comparison</h1>
    <p>Standard / Pro Max / Raw Edition &mdash; open each in separate tab for full experience</p>
  </div>
  <div class="grid">
    <div class="panel">
      <div class="pl">Standard <span class="badge badge-std">v1.0</span></div>
      <iframe src="index.html"></iframe>
    </div>
    <div class="panel">
      <div class="pl">Pro Max <span class="badge badge-pro">v2.0</span></div>
      <iframe src="index-pro.html"></iframe>
    </div>
    <div class="panel raw">
      <div class="pl">Raw Edition <span class="badge badge-raw">v3.0</span></div>
      <iframe src="index-raw.html"></iframe>
    </div>
  </div>
  <div class="leg">
    <span><span class="dot" style="background:#A1A1AA"></span> Standard: Dark + Glass Morphism</span>
    <span><span class="dot" style="background:linear-gradient(135deg,#6366F1,#EC4899)"></span> Pro Max: Cursor Glow + Magnetic + 3D</span>
    <span><span class="dot" style="background:#00E5FF"></span> Raw: Brutalist + Space Mono + No Emoji</span>
  </div>
</body>
</html>
