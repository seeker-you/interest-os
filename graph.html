<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>兴趣星系图谱 — Interest OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-[#05050A] text-[#FAFAFA]">
  <div class="starfield"></div>
  <div class="grid-pattern"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo" style="text-decoration:none">Interest OS</a>
    <div class="flex items-center gap-3">
      <a href="share.html" class="btn btn-secondary btn-sm">📤 分享</a>
    </div>
  </nav>

  <div class="page-container">
    <div class="graph-layout">
      <div class="graph-main" id="graphMain">
        <div class="view-switcher">
          <button class="view-btn active" data-view="galaxy" title="星系图">🌌</button>
          <button class="view-btn" data-view="tagcloud" title="标签云">🏷️</button>
          <button class="view-btn" data-view="radar" title="雷达图">🎯</button>
        </div>
        <div id="vizContainer" class="w-full h-full" style="min-height:500px"></div>
      </div>

      <div class="graph-sidebar">
        <div class="glass glass-xl p-6" id="tagDetail">
          <p class="text-sm text-[#71717A] text-center py-8">点击星系中的星球<br>查看兴趣详情</p>
        </div>
        <div class="stats-bar" id="statsBar">
          <div class="stat-item">
            <div class="stat-value" id="echoIndex">--</div>
            <div class="stat-label">茧房指数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="diversityScore">--</div>
            <div class="stat-label">多样性</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="personaName">--</div>
            <div class="stat-label">人格类型</div>
          </div>
        </div>
        <button id="editBtn" class="btn btn-secondary w-full">✏️ 编辑标签</button>
        <a href="share.html" class="btn btn-primary w-full">📤 生成分享卡片</a>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/keywords.js"></script>
  <script src="js/personas.js"></script>
  <script src="js/router.js"></script>
  <script src="js/galaxy.js"></script>
  <script src="js/tagcloud.js"></script>
  <script src="js/radar.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/graph-init.js"></script>
</body>
</html>
