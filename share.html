<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分享 — Interest OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-[#05050A] text-[#FAFAFA]">
  <div class="starfield"></div>
  <div class="grid-pattern"></div>
  <div class="glow-orb glow-orb-2"></div>

  <nav class="nav">
    <a href="graph.html" class="nav-logo" style="text-decoration:none">← Interest OS</a>
    <button id="copyLinkBtn" class="btn btn-secondary btn-sm">🔗 复制链接</button>
  </nav>

  <div class="page-container flex flex-col items-center">
    <h1 class="text-2xl font-bold mb-2 animate-in">你的数字人格</h1>
    <p class="text-[#71717A] mb-8 animate-in animate-in-delay-1">长按保存图片，分享给你的朋友</p>

    <!-- Share Card Preview -->
    <div class="share-preview mb-8 animate-in animate-in-delay-2" id="shareCard">
      <canvas id="shareCanvas" class="hidden"></canvas>
      <div id="shareCardInner" class="w-full h-full relative">
        <!-- Mini Galaxy -->
        <canvas id="miniGalaxyCanvas" class="absolute top-10 left-1/2 -translate-x-1/2" width="200" height="200"></canvas>
        <!-- Persona -->
        <div id="personaSection" class="absolute bottom-[320px] left-0 right-0 text-center">
          <div class="share-persona-label">你 的 算 法 人 格</div>
          <div class="share-persona-name" id="displayPersona">--</div>
        </div>
        <!-- Top Tags -->
        <div id="tagSection" class="absolute bottom-[140px] left-8 right-8"></div>
        <!-- Watermark -->
        <div class="share-watermark">interest-os.vercel.app</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex gap-4 animate-in animate-in-delay-3">
      <button id="downloadBtn" class="btn btn-primary btn-lg">💾 保存图片</button>
      <button id="copyBtn" class="btn btn-secondary btn-lg">🔗 复制链接</button>
    </div>

    <!-- Back to upload -->
    <div class="mt-12 text-center animate-in animate-in-delay-4">
      <p class="text-sm text-[#71717A] mb-3">还没有用真实数据分析？</p>
      <a href="upload.html" class="btn btn-primary">✦ 用真实数据分析自己</a>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/keywords.js"></script>
  <script src="js/personas.js"></script>
  <script src="js/router.js"></script>
  <script src="js/share.js"></script>
  <script>
    (function() {
      var profile = INTEREST_OS.router.getData();
      if (!profile || !profile.tags) {
        INTEREST_OS.router.startDemo();
        return;
      }

      var persona = INTEREST_OS.personas.determine(profile.tags);
      var topTags = profile.tags.slice().sort(function(a,b) { return b.weight - a.weight; }).slice(0, 3);

      // Update display
      document.getElementById('displayPersona').textContent = persona.name;

      // Mini galaxy in share card
      var miniCanvas = document.getElementById('miniGalaxyCanvas');
      if (miniCanvas) {
        var mctx = miniCanvas.getContext('2d');
        var cx = 100, cy = 100, maxR = 85;
        var maxWeight = Math.max.apply(null, profile.tags.map(function(t){return t.weight;})) || 1;

        // Connections
        mctx.strokeStyle = 'rgba(255,255,255,0.06)';
        mctx.lineWidth = 0.5;
        profile.tags.forEach(function(tag) {
          (tag.relatedTags || []).forEach(function(rid) {
            var other = profile.tags.find(function(o){return o.id===rid;});
            if (!other) return;
            var a1 = Math.random() * Math.PI * 2;
            var a2 = a1 + 0.4;
            var r1 = (tag.weight/maxWeight)*maxR*0.6 + 10;
            var r2 = (other.weight/maxWeight)*maxR*0.6 + 10;
            mctx.beginPath();
            mctx.moveTo(cx+Math.cos(a1)*r1, cy+Math.sin(a1)*r1);
            mctx.lineTo(cx+Math.cos(a2)*r2, cy+Math.sin(a2)*r2);
            mctx.stroke();
          });
        });

        // Planets
        var angleStep = (Math.PI*2)/profile.tags.length;
        profile.tags.forEach(function(tag,i) {
          var angle = i*angleStep + (Math.random()-0.5)*0.4;
          var r = (tag.weight/maxWeight)*maxR*0.6 + 8;
          var x = cx+Math.cos(angle)*r, y = cy+Math.sin(angle)*r;
          var radius = 4+(tag.weight/maxWeight)*14;

          var glow = mctx.createRadialGradient(x,y,0,x,y,radius*2);
          glow.addColorStop(0, tag.color+'30');
          glow.addColorStop(1, 'transparent');
          mctx.fillStyle = glow;
          mctx.beginPath(); mctx.arc(x,y,radius*2,0,Math.PI*2); mctx.fill();

          var grad = mctx.createRadialGradient(x-radius*0.3, y-radius*0.3, 0, x, y, radius);
          grad.addColorStop(0, INTEREST_OS.utils.lightenHex(tag.color, 50));
          grad.addColorStop(1, tag.color);
          mctx.fillStyle = grad;
          mctx.beginPath(); mctx.arc(x,y,radius,0,Math.PI*2); mctx.fill();
        });
      }

      // Top tags section
      var tagSection = document.getElementById('tagSection');
      tagSection.innerHTML = topTags.map(function(tag, i) {
        var barW = (tag.weight/100)*200;
        var barColor = i===0 ? persona.colorStart||'#6366F1' : i===1 ? persona.colorEnd||'#8B5CF6' : '#A1A1AA';
        return '<div class="flex items-center gap-2 mb-3">' +
          '<span class="text-xs text-[#71717A] w-5">0'+(i+1)+'</span>' +
          '<span class="text-sm text-[#A1A1AA] flex-1">'+escHtml(tag.name)+'</span>' +
          '<div style="height:4px;width:'+barW+'px;background:'+barColor+';border-radius:2px"></div>' +
          '<span class="text-xs text-[#71717A] w-8 text-right">'+tag.weight+'%</span>' +
          '</div>';
      }).join('');

      function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      // Download as image
      document.getElementById('downloadBtn').addEventListener('click', function() {
        var dataUrl = INTEREST_OS.share.generate(profile, '#shareCanvas');
        if (!dataUrl) { alert('生成图片失败'); return; }
        var a = document.createElement('a');
        a.href = dataUrl;
        a.download = 'interest-os-' + persona.name + '.png';
        a.click();
      });

      // Copy link
      document.getElementById('copyBtn').addEventListener('click', function() {
        var url = window.location.origin + '/index.html';
        navigator.clipboard.writeText(url).then(function() {
          alert('链接已复制！分享给朋友吧 ✨');
        }).catch(function() {
          prompt('复制这个链接分享:', url);
        });
      });

      document.getElementById('copyLinkBtn').addEventListener('click', function() {
        var url = window.location.origin + '/index.html';
        navigator.clipboard.writeText(url).then(function() {
          alert('链接已复制！');
        });
      });
    })();
  </script>
</body>
</html>
