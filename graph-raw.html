<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy — Interest OS</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/custom-raw.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%230D0D0D'/><text x='6' y='22' font-size='18' font-weight='bold' fill='%2300E5FF' font-family='monospace'>IO</text></svg>">
  <style>
    #langToggle {
      font-family: var(--font-mono); font-size: 0.6875rem; font-weight: 700;
      color: var(--accent); background: rgba(0,229,255,0.08);
      border: 1px solid rgba(0,229,255,0.2);
      padding: 4px 10px; cursor: pointer; transition: all 0.15s; margin-left: 8px;
    }
    #langToggle:hover { background: rgba(0,229,255,0.15); }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="grid-bg"></div>

  <nav class="nav">
    <a href="index.html" class="nav-brand">&gt; interest_<span>os</span></a>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="mono" style="font-size:0.6875rem;color:var(--text-muted)">// galaxy view</span>
      <a href="share-raw.html" class="btn btn-secondary btn-sm">
        <svg width="14" height="14"><use href="#icon-share"/></svg> <span data-i18n="nav.share">Share</span>
      </a>
      <button id="langToggle">EN</button>
    </div>
  </nav>

  <main class="container" style="max-width:1280px;padding-top:80px">
    <div class="graph-grid">
      <div class="graph-canvas" id="graphMain">
        <div class="view-switch">
          <button class="active" data-view="galaxy"><svg width="18" height="18"><use href="#icon-galaxy"/></svg></button>
          <button data-view="tagcloud"><svg width="18" height="18"><use href="#icon-tag"/></svg></button>
          <button data-view="radar"><svg width="18" height="18"><use href="#icon-radar"/></svg></button>
        </div>
        <div id="vizContainer" style="width:100%;height:100%;min-height:500px"></div>
      </div>

      <div class="graph-side">
        <div class="card" id="tagDetail" style="flex:1">
          <p class="mono" style="font-size:0.75rem;color:var(--text-muted);text-align:center;padding:40px 0" data-i18n="graph.tag_placeholder">Click a planet<br>to see details</p>
        </div>

        <div class="stats-row">
          <div class="stat-cell">
            <div class="stat-val" id="echoIndex">--</div>
            <div class="stat-lbl" data-i18n="graph.echo">Echo Chamber</div>
          </div>
          <div class="stat-cell">
            <div class="stat-val" id="diversityScore">--</div>
            <div class="stat-lbl" data-i18n="graph.diversity">Diversity</div>
          </div>
          <div class="stat-cell">
            <div class="stat-val" id="personaName">--</div>
            <div class="stat-lbl" data-i18n="graph.persona">Persona</div>
          </div>
        </div>

        <button id="editBtn" class="btn btn-secondary" style="width:100%">
          <svg width="16" height="16"><use href="#icon-edit"/></svg> <span data-i18n="graph.edit_btn">Edit Tags</span>
        </button>
        <a href="upload-raw.html" class="btn btn-secondary btn-sm" style="width:100%;margin-bottom:8px"><svg width="14" height="14"><use href="#icon-upload"/></svg> New Analysis</a>
<a href="share-raw.html" class="btn btn-primary" style="width:100%">
          <svg width="16" height="16"><use href="#icon-share"/></svg> <span data-i18n="graph.share_btn">Generate Card</span>
        </a>
      </div>
    </div>
  </main>

  <div class="edit-overlay" id="editOverlay">
    <div class="edit-panel">
      <h3>&gt; <span data-i18n="graph.edit_title">edit_tags</span></h3>
      <div id="editList"></div>
      <div style="display:flex;gap:8px;margin-bottom:20px">
        <input type="text" class="input" id="addTagName" data-i18n="graph.add_placeholder" placeholder="new tag name" style="flex:1">
        <input type="number" class="input" id="addTagWeight" placeholder="wt" min="1" max="100" style="width:70px">
        <button id="addTagBtn" class="btn btn-secondary btn-sm" data-i18n="graph.add_btn">Add</button>
      </div>
      <div style="display:flex;gap:8px">
        <button id="saveEditBtn" class="btn btn-primary" style="flex:1" data-i18n="graph.save">Save</button>
        <button id="cancelEditBtn" class="btn btn-secondary" style="flex:1" data-i18n="graph.cancel">Cancel</button>
      </div>
    </div>
  </div>

  <svg style="display:none" aria-hidden="true">
    <symbol id="icon-galaxy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></symbol>
    <symbol id="icon-tag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></symbol>
    <symbol id="icon-radar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="12 2 22 12 12 22 2 12"/></symbol>
    <symbol id="icon-share" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
  </svg>

  <script src="js/utils.js"></script>
  <script src="js/keywords.js"></script>
  <script src="js/personas.js"></script>
  <script src="js/router.js"></script>
  <script src="js/galaxy.js"></script>
  <script src="js/tagcloud.js"></script>
  <script src="js/radar.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    document.addEventListener('i18n:changed', function() {
      // Re-render tag detail with new language
      if (window._lastTag) showTagDetail(window._lastTag);
    });

    (function() {
      var profile = INTEREST_OS.router.getData();
      if (!profile || !profile.tags || profile.tags.length === 0) {
        INTEREST_OS.router.loadDemo().then(function(d) {
          if (d) { INTEREST_OS.router.setData(d); location.reload(); }
        });
        return;
      }

      var tags = profile.tags.slice();
      var currentView = 'galaxy';
      window._lastTag = null;

      var analysis = profile.analysis || {};
      document.getElementById('echoIndex').textContent = (analysis.echoChamberIndex || '--') + '%';
      document.getElementById('diversityScore').textContent = (analysis.diversityScore || '--') + '%';
      document.getElementById('personaName').textContent = analysis.personaType || '--';

      function renderView(view) {
        var container = document.getElementById('vizContainer');
        if (currentView === 'radar') INTEREST_OS.radar.destroy();
        if (currentView === 'galaxy') INTEREST_OS.galaxy.destroy();
        container.innerHTML = '';
        switch(view) {
          case 'galaxy': INTEREST_OS.galaxy.init('#vizContainer', tags, { onNodeClick: showTagDetail }); break;
          case 'tagcloud': INTEREST_OS.tagcloud.init('#vizContainer', tags, { onTagClick: showTagDetail }); break;
          case 'radar': INTEREST_OS.radar.init('#vizContainer', tags); break;
        }
        currentView = view;
      }

      function showTagDetail(tag) {
        window._lastTag = tag;
        var el = document.getElementById('tagDetail');
        if (!tag) {
          el.innerHTML = '<p class="mono" style="font-size:0.75rem;color:var(--text-muted);text-align:center;padding:40px 0">' +
            INTEREST_OS.i18n.t('graph.tag_placeholder').replace('\n','<br>') + '</p>';
          return;
        }
        var t = INTEREST_OS.i18n.t.bind(INTEREST_OS.i18n);
        var sourceTitles = (tag.sourceTitles || []).slice(0, 5);
        var relatedHtml = '';
        if (tag.relatedTags && tag.relatedTags.length > 0) {
          relatedHtml = '<div><span class="text-xs" style="color:var(--text-muted)">' + t('graph.related') + '</span><div class="flex flex-wrap gap-1 mt-1">';
          tag.relatedTags.forEach(function(rid) {
            var rt = tags.find(function(t2) { return t2.id === rid; });
            if (rt) relatedHtml += '<span class="tag text-xs">' + escHtml(rt.name) + '</span>';
          });
          relatedHtml += '</div></div>';
        }
        var srcHtml = '';
        if (sourceTitles.length > 0) {
          srcHtml = '<div><span class="text-xs" style="color:var(--text-muted)">' + t('graph.source') + '</span><div class="text-xs" style="color:var(--text-dim);margin-top:4px;line-height:1.6">';
          sourceTitles.forEach(function(st) { srcHtml += '<div>· ' + escHtml(st) + '</div>'; });
          srcHtml += '</div></div>';
        }
        el.innerHTML =
          '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">' +
          '<span style="width:8px;height:8px;background:' + tag.color + ';box-shadow:0 0 10px ' + tag.color + '"></span>' +
          '<h3 class="mono" style="font-size:1rem;font-weight:700">' + escHtml(tag.name) + '</h3></div>' +
          '<div style="display:flex;flex-direction:column;gap:10px;font-size:0.8125rem">' +
          '<div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">' + t('graph.weight') + '</span><span style="color:var(--accent);font-family:var(--font-mono);font-weight:700">' + tag.weight + '%</span></div>' +
          '<div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">' + t('graph.category') + '</span><span style="color:var(--text-dim);font-family:var(--font-mono)">' + (tag.category || '-') + '</span></div>' +
          relatedHtml + srcHtml +
          (tag.isUserEdited ? '<div style="font-size:0.75rem;color:#FFB800;margin-top:4px">' + t('graph.edited') + '</div>' : '') +
          '</div>';
      }

      function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

      document.querySelectorAll('.view-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.view-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          renderView(btn.dataset.view);
        });
      });

      var editor = INTEREST_OS.editor;
      editor.init(function(newTags) {
        tags = newTags;
        profile.tags = newTags;
        var persona = INTEREST_OS.personas.determine(newTags);
        profile.analysis.personaType = persona.name;
        document.getElementById('personaName').textContent = persona.name;
        INTEREST_OS.router.setData(profile);
        renderView(currentView);
        showTagDetail(null);
      });

      document.getElementById('editBtn').addEventListener('click', function() { editor.open(tags); });
      renderView('galaxy');
      window.addEventListener('resize', INTEREST_OS.utils.debounce(function() { renderView(currentView); }, 400));
    })();
  </script>
</body>
</html>
